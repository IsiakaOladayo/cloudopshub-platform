alertmanager:
  config:
    global:
      slack_api_url: YOUR_SLACK_WEBHOOK_URL
    receivers:
    - name: slack-notifications
      slack_configs:
      - channel: '#alerts'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        title: "🔔 Alert: {{ .CommonAnnotations.summary }}"
    route:
      group_by:
      - alertname
      group_interval: 5m
      group_wait: 30s
      receiver: slack-notifications
      repeat_interval: 12h
  enabled: true
grafana:
  adminPassword: CloudOps2025!
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 10Gi
    accessModes:
      - ReadWriteOnce
kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
prometheus:
  prometheusSpec:
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 512Mi
    retention: 7d
