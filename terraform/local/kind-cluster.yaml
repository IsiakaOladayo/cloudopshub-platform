kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: cloudopshub-local

nodes:
  - role: control-plane

networking:
  disableDefaultCNI: false
  podSubnet: "10.244.0.0/16"

kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        enable-admission-plugins: NodeRestriction
