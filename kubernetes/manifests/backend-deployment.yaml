# backend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudopshub-backend
  namespace: production
  labels:
    app: cloudopshub-backend
spec:
  replicas: 2          # Run 2 copies for high availability
  selector:
    matchLabels:
      app: cloudopshub-backend
  template:
    metadata:
      labels:
        app: cloudopshub-backend
    spec:
      containers:
        - name: backend
          image: kaptainjamjam/cloudopshub-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: database-url
          resources:
            requests: { cpu: '100m', memory: '128Mi' }
            limits:   { cpu: '500m', memory: '512Mi' }
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 10